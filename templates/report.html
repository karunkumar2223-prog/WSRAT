<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>WSRAT Report</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px #ddd;
}

h1{
color:#2563eb;
}

table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}

th{

background:#2563eb;
color:white;
padding:10px;

}

td{

padding:10px;
border:1px solid #ddd;

}

.score{

font-size:35px;
font-weight:bold;
color:green;

}

.section{

margin-top:40px;

}

</style>

</head>

<body>

<div class="container">

<h1>WSRAT Security Report</h1>

<p><b>Target:</b> {{ target }}</p>

<p><b>Generated:</b> {{ generated }}</p>

<div class="score">

Overall Score

{{ score }}/100

</div>

<div class="section">

<h2>Scan Results</h2>

<table>

<tr>

<th>Module</th>

<th>Result</th>

</tr>

{% for module,data in results.items() %}

<tr>

<td>{{ module }}</td>

<td><pre>{{ data }}</pre></td>

</tr>

{% endfor %}

</table>

</div>

</div>

</body>

</html>
